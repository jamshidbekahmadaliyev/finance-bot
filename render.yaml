services:
  - type: web
    name: personal-finance-telegram-bot
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: USE_WEBHOOK
        value: true
      - key: WEBHOOK_PATH
        value: /telegram
      - key: PORT
        value: 8080
